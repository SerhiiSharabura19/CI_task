name: Playwright reporting
on:
  push:
    branches: [1stMatrixStrategy]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Run ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Authentication
            spec: tests/TC-1/signUp.spec.ts
          - name: Customer Flows
            spec: tests/TC-12/addProductsIntoCart.spec.ts tests/TC-18/viewCategoryProducts.spec.ts
          - name: API
            spec: tests/API/API.spec.ts
    env:
      PRODUCTS_LIST_ENDPOINT: ${{ secrets.PRODUCTS_LIST_ENDPOINT }}
      BRANDS_LIST_ENDPOINT: ${{ secrets.BRANDS_LIST_ENDPOINT }}
      VERIFY_LOGIN_ENDPOINT: ${{ secrets.VERIFY_LOGIN_ENDPOINT }}
      BASE_URL: ${{ secrets.BASE_URL }}
    steps:
      - uses: actions/checkout@v3

      - name: Setup dependencies
        run: npm i

      - name: Playwright browser updates
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test ${{ matrix.spec }} --grep "${{ github.event.inputs.grep }}" --project=chromium
        env:
          TESTOMATIO: ${{ secrets.TESTOMATIO }}
          TESTOMATIO_RUN: ${{ github.event.inputs.run }}
          TESTOMATIO_URL: ${{ github.event.inputs.testomatio_url }}

  reporting:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js 24
        uses: actions/setup-node@v3
        with:
          node-version: 24.x